name: Check Gemini Model Drift

# Weekly diff of MODEL_CHAIN against Google's ListModels API.
# Job failure auto-emails the repo owner via GitHub's default notification
# settings, so any drift surfaces without extra plumbing.

on:
  schedule:
    # Monday 12:47 UTC (~8:47 AM ET) — well after the daily digest finishes.
    # :47 is off the cron-job rush hour to reduce GH Actions queue delay.
    - cron: '47 12 * * 1'
  workflow_dispatch:

jobs:
  check-models:
    # Shares the AUTOMATION_RUNNER switch with the daily digest so all scheduled
    # automation runs in one place (GitHub-hosted by default). See docs/RUNNER.md.
    runs-on: ${{ vars.AUTOMATION_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      # setup-python everywhere except a self-hosted macOS runner (its installer needs
      # passwordless sudo); macOS self-hosted builds a venv from the runner's Python.
      # See digest.yml / docs/RUNNER.md (D-033).
      - name: Set up Python 3.12
        if: ${{ !(vars.AUTOMATION_RUNNER != '' && runner.os == 'macOS') }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Python 3.12 via venv (self-hosted macOS)
        if: ${{ vars.AUTOMATION_RUNNER != '' && runner.os == 'macOS' }}
        run: |
          python3.12 -m venv "$RUNNER_TEMP/venv"
          echo "$RUNNER_TEMP/venv/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: pip install -e .

      - name: Run drift check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: research-digest check-models --verbose
