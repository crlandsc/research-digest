name: Daily Research Digest

on:
  schedule:
    # ~5:37 AM ET weekdays (9:37 UTC during EDT, 10:37 UTC during EST)
    # :37 (prime-ish, not :00 or :05) avoids the heaviest GH Actions cron spikes;
    # see https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#schedule
    - cron: '37 9 * * 1-5'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Override lookback days (default: auto based on day of week)'
        required: false
        type: number

jobs:
  digest:
    # Runner selection — see docs/RUNNER.md. Defaults to GitHub-hosted ubuntu-latest.
    # arXiv throttles GitHub's *shared* egress IPs (D-031); a self-hosted runner on an
    # always-on box uses an un-throttled IP. The AUTOMATION_RUNNER repo variable governs
    # ALL scheduled automation (this digest + check-models.yml) so they move together:
    # set it to your runner's label (e.g. 'self-hosted') to route here, unset it to fall
    # back to GitHub-hosted. Unset for forks/other users => ubuntu-latest (unchanged).
    runs-on: ${{ vars.AUTOMATION_RUNNER || 'ubuntu-latest' }}
    # 150 min covers three run attempts (~15 min each) with 30 + 60 min sleeps
    # between them when arXiv rate-limits the runner's egress IP.
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12 (GitHub-hosted runners)
        if: ${{ !vars.AUTOMATION_RUNNER }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Self-hosted (AUTOMATION_RUNNER set): actions/setup-python's macOS installer
      # runs `sudo installer` to put the python.org .pkg in /Library/Frameworks, which
      # needs passwordless sudo the self-hosted user lacks. Instead build an isolated
      # venv from the runner's pre-installed Python 3.12 (on PATH) and prepend it so the
      # steps below resolve python/pip/research-digest from the venv.
      - name: Set up Python venv (self-hosted runner)
        if: ${{ vars.AUTOMATION_RUNNER }}
        run: |
          python3.12 -m venv "$RUNNER_TEMP/venv"
          echo "$RUNNER_TEMP/venv/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: pip install -e .

      - name: Diagnostics
        run: |
          echo "=== Environment ==="
          echo "Date: $(date -u)"
          echo "Day of week: $(date -u +%u) (1=Mon)"
          echo "Python: $(python --version)"
          echo "research-digest: $(research-digest --version)"
          echo ""
          echo "=== Config ==="
          echo "Config file: $(ls config/topics.yaml 2>/dev/null && echo 'found' || echo 'NOT FOUND - will use example')"
          head -5 config/topics.yaml 2>/dev/null || echo "topics.yaml missing"
          echo ""
          echo "=== Network ==="
          echo "Testing arXiv connectivity..."
          curl -sI https://export.arxiv.org/api/query?search_query=cat:cs.SD\&max_results=1 | head -10
          echo ""
          echo "=== Secrets check ==="
          echo "GEMINI_API_KEY: $([ -n '${{ secrets.GEMINI_API_KEY }}' ] && echo 'set' || echo 'MISSING')"
          echo "GMAIL_APP_PASSWORD: $([ -n '${{ secrets.GMAIL_APP_PASSWORD }}' ] && echo 'set' || echo 'MISSING')"
          echo "EMAIL_FROM: $([ -n '${{ secrets.EMAIL_FROM }}' ] && echo 'set' || echo 'MISSING')"
          echo "EMAIL_TO: $([ -n '${{ secrets.EMAIL_TO }}' ] && echo 'set' || echo 'MISSING')"

      - name: Determine lookback days
        id: lookback
        run: |
          if [ -n "${{ inputs.lookback_days }}" ]; then
            echo "days=${{ inputs.lookback_days }}" >> $GITHUB_OUTPUT
          else
            DOW=$(date -u +%u)
            if [ "$DOW" = "1" ]; then
              echo "days=3" >> $GITHUB_OUTPUT
            else
              echo "days=1" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Lookback days: $(cat $GITHUB_OUTPUT)"

      - name: Run digest pipeline with email
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          LOOKBACK_DAYS: ${{ steps.lookback.outputs.days }}
        run: |
          # Workflow-level retry on a transient arXiv failure (CLI exit code 75).
          # arXiv's Fastly/Varnish CDN throttles (429) and overloads (503) shared
          # CI egress IPs and the window can persist many minutes — longer than
          # in-process backoff can safely cover. On an exit-75 (EX_TEMPFAIL), sleep
          # and re-run; later attempts may land on a different runner or after the
          # throttle/outage clears. (Exit 75 covers 429, any 5xx, and network errors.)
          # Sleep schedule between attempts: 30 min, then 60 min.
          set +e
          sleeps=(0 1800 3600)  # seconds before attempts 1, 2, 3
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            wait=${sleeps[$((attempt - 1))]}
            if [ "$wait" -gt 0 ]; then
              echo "arXiv rate-limited (exit 75). Sleeping $((wait / 60)) min before attempt $attempt..."
              sleep "$wait"
            fi
            echo "::group::digest run attempt $attempt/$max_attempts"
            research-digest run \
              --lookback-days "$LOOKBACK_DAYS" \
              --send-email \
              --verbose
            rc=$?
            echo "::endgroup::"
            if [ "$rc" -eq 0 ]; then
              echo "Digest run succeeded on attempt $attempt."
              exit 0
            fi
            if [ "$rc" -ne 75 ] || [ "$attempt" -ge "$max_attempts" ]; then
              echo "Digest run failed (exit $rc, attempt $attempt). Giving up."
              exit "$rc"
            fi
          done

      - name: Upload digest artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: digest-${{ github.run_id }}
          path: output/
          retention-days: 30
