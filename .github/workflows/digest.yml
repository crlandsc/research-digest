name: Daily Research Digest

on:
  schedule:
    # 8:00 AM ET weekdays (12:00 UTC during EDT, 13:00 UTC during EST)
    # Using 12:00 UTC — will be 8am EDT (Mar-Nov) or 7am EST (Nov-Mar)
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Override lookback days (default: auto based on day of week)'
        required: false
        type: number

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e .

      - name: Diagnostics
        run: |
          echo "=== Environment ==="
          echo "Date: $(date -u)"
          echo "Day of week: $(date -u +%u) (1=Mon)"
          echo "Python: $(python --version)"
          echo "research-digest: $(research-digest --version)"
          echo ""
          echo "=== Config ==="
          echo "Config file: $(ls config/topics.yaml 2>/dev/null && echo 'found' || echo 'NOT FOUND - will use example')"
          head -5 config/topics.yaml 2>/dev/null || echo "topics.yaml missing"
          echo ""
          echo "=== Network ==="
          echo "Testing arXiv connectivity..."
          curl -sI https://export.arxiv.org/api/query?search_query=cat:cs.SD\&max_results=1 | head -10
          echo ""
          echo "=== Secrets check ==="
          echo "GEMINI_API_KEY: $([ -n '${{ secrets.GEMINI_API_KEY }}' ] && echo 'set' || echo 'MISSING')"
          echo "GMAIL_APP_PASSWORD: $([ -n '${{ secrets.GMAIL_APP_PASSWORD }}' ] && echo 'set' || echo 'MISSING')"
          echo "EMAIL_FROM: $([ -n '${{ secrets.EMAIL_FROM }}' ] && echo 'set' || echo 'MISSING')"
          echo "EMAIL_TO: $([ -n '${{ secrets.EMAIL_TO }}' ] && echo 'set' || echo 'MISSING')"

      - name: Determine lookback days
        id: lookback
        run: |
          if [ -n "${{ inputs.lookback_days }}" ]; then
            echo "days=${{ inputs.lookback_days }}" >> $GITHUB_OUTPUT
          else
            DOW=$(date -u +%u)
            if [ "$DOW" = "1" ]; then
              echo "days=3" >> $GITHUB_OUTPUT
            else
              echo "days=1" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Lookback days: $(cat $GITHUB_OUTPUT)"

      - name: Run digest pipeline with email
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          research-digest run \
            --lookback-days ${{ steps.lookback.outputs.days }} \
            --send-email \
            --verbose

      - name: Upload digest artifact
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: digest-${{ github.run_id }}
          path: output/
          retention-days: 30
