name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Always GitHub-hosted — deliberately NOT on the AUTOMATION_RUNNER switch. This is CI
    # triggered by pushes/PRs (incl. forks of this public repo); running untrusted PR code
    # on a self-hosted runner is unsafe, and tests don't touch arXiv. See docs/RUNNER.md.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v
