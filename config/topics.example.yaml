version: 1

# ============================================================================
# EXAMPLE CONFIG — Customize this for your research interests
# ============================================================================
# Copy this file to get started:
#   cp config/topics.example.yaml config/topics.yaml
#
# Then edit the categories, keywords, and topic groups below.
# The defaults target general ML/AI as a starting point.
#
# Finding arXiv categories for your field:
#   https://arxiv.org/category_taxonomy
#
# Common categories by field:
#   NLP:              cs.CL, cs.AI
#   Computer Vision:  cs.CV, cs.AI, cs.LG
#   Robotics:         cs.RO, cs.AI, cs.SY
#   Audio/Music:      cs.SD, eess.AS, cs.MM
#   Physics:          cond-mat.str-el, hep-th, quant-ph
#   Mathematics:      math.AG, math.RA, math.CO
#   Biology:          q-bio.GN, q-bio.BM
#   Economics:        econ.GN, econ.TH
# ============================================================================

sources:
  arxiv:
    enabled: true
    # arXiv category codes for your field
    categories:
      - cs.LG       # Machine Learning
      - cs.AI       # Artificial Intelligence
      - cs.CL       # Computation and Language
      - stat.ML     # Machine Learning (Statistics)

    # Keywords combined with categories via AND
    # Only papers matching at least one keyword are returned
    # Leave empty to fetch ALL papers in your categories
    keyword_queries:
      - "large language model"
      - "transformer"
      - "reinforcement learning"
      - "diffusion model"
      - "representation learning"
      - "fine-tuning"

    lookback_days: 7
    max_results_per_run: 200

filters:
  required_keywords: []
  excluded_keywords:
    - survey
    - tutorial
  max_authors: null

ranking:
  prioritize_recency: true
  prioritize_keyword_matches: true
  max_candidates_for_digest: 20

digest:
  title: Research Digest
  formats:
    - markdown
  include_abstract_excerpt: true
  include_reason_selected: true
  include_links: true

# How papers are grouped in the email digest
# Papers are assigned to the group whose keywords they match most strongly
keyword_groups:
  "Language Models":
    - "large language model"
    - "transformer"
  "Reinforcement Learning":
    - "reinforcement learning"
  "Generative Models":
    - "diffusion model"
  "Representation Learning":
    - "representation learning"
    - "fine-tuning"

summarization:
  # "extractive" — first 3 sentences of abstract (no API key needed)
  # "llm" — concise newsletter-style summaries via Gemini (free tier)
  mode: extractive
  # "none" or "gemini"
  provider: none
