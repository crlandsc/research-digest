version: 1

sources:
  arxiv:
    enabled: true
    # arXiv category codes — papers in these categories matching keywords will be fetched
    categories:
      - cs.SD       # Sound
      - eess.AS     # Audio and Speech Processing
      - cs.MM       # Multimedia
      - cs.LG       # Machine Learning
      - cs.AI       # Artificial Intelligence
      - cs.IR       # Information Retrieval
      - cs.CL       # Computation and Language
      - eess.SP     # Signal Processing

    # Keywords combined with categories via AND — only papers matching at least one keyword are returned
    # Leave empty to fetch all papers in listed categories
    keyword_queries:
      - "music generation"
      - "audio synthesis"
      - "audio classification"
      - "source separation"
      - "speech synthesis"
      - "audio representation learning"

    lookback_days: 7
    max_results_per_run: 200

filters:
  required_keywords: []
  excluded_keywords:
    - survey
    - tutorial
  max_authors: null

ranking:
  prioritize_recency: true
  prioritize_keyword_matches: true
  max_candidates_for_digest: 20

digest:
  title: Research Digest
  formats:
    - markdown
  include_abstract_excerpt: true
  include_reason_selected: true
  include_links: true

# Maps keywords to named topic sections in the email digest
# Papers are assigned to the group whose keywords they match most strongly
keyword_groups:
  "Music Generation":
    - "music generation"
    - "audio synthesis"
  "Audio Classification":
    - "audio classification"
  "Source Separation":
    - "source separation"
  "Speech & Voice":
    - "speech synthesis"
  "Audio Representations":
    - "audio representation learning"

summarization:
  # "extractive" uses first 3 sentences of abstract (no API key needed)
  # "llm" uses configured provider for concise newsletter-style summaries
  mode: extractive
  # "none" for no LLM, "gemini" for Google Gemini Flash (free tier)
  provider: none
